# Dose test layout — 100 kV EBPG CMI EPFL
# Gap rules: 30 µm min between structures (3× backscatter radius), 50 µm between groups
output: { file: output/gds/metasurface_dose_test.gds }

top_cells:

  # --- DOSE TEST GRATINGS (50×50 µm, 2×3 grid, y=±40 → 30 µm gap, step 80 µm → 30 µm gap) ---
  # pitch=300 nm, drawn_width = pitch - gap, cols at x=0/80/160, edges x∈[-25,185]
  - name: METASURFACE_DOSE_TEST
    layer: 1
    datatype: 0
    metasurfaces:
      - name: METASURFACE_GRATING_GAP_090
        origin: [0, 40]
        unit_cell:
          type: supercell
          cells: [{ type: rectangle, width_um: 0.210, height_um: 50, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.3, nx: 167, ny: 1 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_GRATING_GAP_100
        origin: [0, -40]
        unit_cell:
          type: supercell
          cells: [{ type: rectangle, width_um: 0.200, height_um: 50, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.3, nx: 167, ny: 1 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_GRATING_GAP_110
        origin: [80, 40]
        unit_cell:
          type: supercell
          cells: [{ type: rectangle, width_um: 0.190, height_um: 50, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.3, nx: 167, ny: 1 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_GRATING_GAP_120
        origin: [80, -40]
        unit_cell:
          type: supercell
          cells: [{ type: rectangle, width_um: 0.180, height_um: 50, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.3, nx: 167, ny: 1 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_GRATING_GAP_130
        origin: [160, 40]
        unit_cell:
          type: supercell
          cells: [{ type: rectangle, width_um: 0.170, height_um: 50, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.3, nx: 167, ny: 1 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_GRATING_GAP_140
        origin: [160, -40]
        unit_cell:
          type: supercell
          cells: [{ type: rectangle, width_um: 0.160, height_um: 50, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.3, nx: 167, ny: 1 }
        aperture: { type: rectangle, width: 50, height: 50 }

  # --- CROSS (50×50 µm, 2×3 grid, y=±40 → 30 µm gap, step 80 µm → 30 µm gap) ---
  # pitch=400 nm, arm_length = pitch - gap, cols at x=260/340/420, 50 µm gap from last grating edge (x=185)
  - name: METASURFACE_CROSS
    layer: 1
    datatype: 0
    metasurfaces:
      - name: METASURFACE_CROSS_GAP_090
        origin: [260, 40]
        unit_cell:
          type: supercell
          cells: [{ type: cross, arm_length_um: 0.310, arm_width_um: 0.100, serif: true, serif_size_um: 0.020 }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CROSS_GAP_100
        origin: [260, -40]
        unit_cell:
          type: supercell
          cells: [{ type: cross, arm_length_um: 0.300, arm_width_um: 0.100, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CROSS_GAP_110
        origin: [340, 40]
        unit_cell:
          type: supercell
          cells: [{ type: cross, arm_length_um: 0.290, arm_width_um: 0.100, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CROSS_GAP_120
        origin: [340, -40]
        unit_cell:
          type: supercell
          cells: [{ type: cross, arm_length_um: 0.280, arm_width_um: 0.100, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CROSS_GAP_130
        origin: [420, 40]
        unit_cell:
          type: supercell
          cells: [{ type: cross, arm_length_um: 0.270, arm_width_um: 0.100, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CROSS_GAP_140
        origin: [420, -40]
        unit_cell:
          type: supercell
          cells: [{ type: cross, arm_length_um: 0.260, arm_width_um: 0.100, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }

  # --- CYLINDERS (50×50 µm, 2×3 grid, y=±40 → 30 µm gap, step 80 µm → 30 µm gap) ---
  # pitch=400 nm, radius = (pitch - gap) / 2, cols at x=520/600/680, 50 µm gap from last cross edge (x=445)
  - name: METASURFACE_CYLINDER
    layer: 1
    datatype: 0
    metasurfaces:
      - name: METASURFACE_CYLINDER_GAP_090
        origin: [520, 40]
        unit_cell:
          type: supercell
          cells: [{ type: circle, radius_um: 0.155, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CYLINDER_GAP_100
        origin: [520, -40]
        unit_cell:
          type: supercell
          cells: [{ type: circle, radius_um: 0.150, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CYLINDER_GAP_110
        origin: [600, 40]
        unit_cell:
          type: supercell
          cells: [{ type: circle, radius_um: 0.145, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CYLINDER_GAP_120
        origin: [600, -40]
        unit_cell:
          type: supercell
          cells: [{ type: circle, radius_um: 0.140, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CYLINDER_GAP_130
        origin: [680, 40]
        unit_cell:
          type: supercell
          cells: [{ type: circle, radius_um: 0.135, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
      - name: METASURFACE_CYLINDER_GAP_140
        origin: [680, -40]
        unit_cell:
          type: supercell
          cells: [{ type: circle, radius_um: 0.130, offset: [0.0, 0.0] }]
        lattice: { kind: square, pitch: 0.4, nx: 125, ny: 125 }
        aperture: { type: rectangle, width: 50, height: 50 }
